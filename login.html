<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Favor Heritage | Login</title>

<link rel="stylesheet" href="../assets/css/style.css">

</head>
<body>

<section class="hero">

<div class="contact-box" style="max-width:450px;">

<h2 style="margin-bottom:20px;">Login</h2>

<form id="loginForm">

<input type="text" id="username" placeholder="Username" required
style="width:100%;padding:15px;margin-bottom:20px;border:none;border-radius:12px;background:#1b1b1b;color:white;">

<input type="password" id="password" placeholder="Password" required
style="width:100%;padding:15px;margin-bottom:20px;border:none;border-radius:12px;background:#1b1b1b;color:white;">

<button class="btn-custom" type="submit" style="border:none;cursor:pointer;">
Login
</button>

</form>

<p style="margin-top:20px;">
Don't have account?
<a href="../register/index.html" style="color:#ffcc70;">Register</a>
</p>

</div>

</section>

<script src="../assets/js/login.js"></script>

</body>
</html>
